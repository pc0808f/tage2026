<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TWQR 快速查找 · TAGE 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .qr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .qr-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
    }
    .qr-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .qr-card-body {
      padding: 7px 10px 10px;
    }
    .qr-machine {
      font-size: .82rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.3;
    }
    .qr-store {
      font-size: .68rem;
      color: var(--text2);
      margin-top: 1px;
    }
    .qr-num {
      font-size: .65rem;
      font-weight: 700;
      color: var(--gray);
      font-family: monospace;
    }

    /* Lightbox */
    .lb-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 10px;
    }
    .lb-wrap.open { display: flex; }
    .lb-wrap img {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }
    .lb-label {
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      text-align: center;
    }
    .lb-sub {
      color: rgba(255,255,255,.65);
      font-size: .75rem;
      text-align: center;
      margin-top: -6px;
    }
    .lb-close {
      position: absolute;
      top: 14px; right: 18px;
      color: #fff;
      font-size: 1.6rem;
      font-weight: 900;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back">← 返回</a>
  <div class="title">💳 TWQR 快速查找</div>
</div>

<div class="section" style="padding-top:12px;">
  <p style="font-size:.75rem;color:var(--text2);margin-bottom:12px;">點縮圖放大・讓客人直接掃碼付款</p>

  <div class="qr-grid">

    <div class="qr-card" onclick="openQR('twqr-m01.jpg','M01 娃娃機','擎天測試店8・111169M8')">
      <img src="twqr-m01.jpg" alt="M01 娃娃機">
      <div class="qr-card-body">
        <div class="qr-machine">M01 娃娃機</div>
        <div class="qr-store">擎天測試店 8</div>
        <div class="qr-num">111169M8</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m02.jpg','M02 打地鼠','擎天測試店2・111169M2')">
      <img src="twqr-m02.jpg" alt="M02 打地鼠">
      <div class="qr-card-body">
        <div class="qr-machine">M02 打地鼠</div>
        <div class="qr-store">擎天測試店 2</div>
        <div class="qr-num">111169M2</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m03.jpg','M03 彈珠台','擎天測試店3・111169M3')">
      <img src="twqr-m03.jpg" alt="M03 彈珠台">
      <div class="qr-card-body">
        <div class="qr-machine">M03 彈珠台</div>
        <div class="qr-store">擎天測試店 3</div>
        <div class="qr-num">111169M3</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m04.jpg','M04 機率扭蛋機','擎天測試店5・111169M5')">
      <img src="twqr-m04.jpg" alt="M04 扭蛋機">
      <div class="qr-card-body">
        <div class="qr-machine">M04 機率扭蛋機</div>
        <div class="qr-store">擎天測試店 5</div>
        <div class="qr-num">111169M5</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m05u.jpg','M05 雙層扭蛋機・上層','擎天測試店6・111169M6')">
      <img src="twqr-m05u.jpg" alt="M05 上層">
      <div class="qr-card-body">
        <div class="qr-machine">M05 扭蛋機 上層</div>
        <div class="qr-store">擎天測試店 6</div>
        <div class="qr-num">111169M6</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m05d.jpg','M05 雙層扭蛋機・下層','擎天測試店7・111169M7')">
      <img src="twqr-m05d.jpg" alt="M05 下層">
      <div class="qr-card-body">
        <div class="qr-machine">M05 扭蛋機 下層</div>
        <div class="qr-store">擎天測試店 7</div>
        <div class="qr-num">111169M7</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-m06.jpg','M06 搖馬','擎天測試店4・111169M4')">
      <img src="twqr-m06.jpg" alt="M06 搖馬">
      <div class="qr-card-body">
        <div class="qr-machine">M06 搖馬</div>
        <div class="qr-store">擎天測試店 4</div>
        <div class="qr-num">111169M4</div>
      </div>
    </div>

    <div class="qr-card" onclick="openQR('twqr-spare9.jpg','備用 測試店9','111169M9')">
      <img src="twqr-spare9.jpg" alt="備用9">
      <div class="qr-card-body">
        <div class="qr-machine" style="color:var(--gray);">備用</div>
        <div class="qr-store">擎天測試店 9</div>
        <div class="qr-num">111169M9</div>
      </div>
    </div>

    <div class="qr-card" style="grid-column:1/-1;flex-direction:row;max-height:110px;"
         onclick="openQR('twqr-spare10.jpg','備用 測試店10','111169M10')">
      <img src="twqr-spare10.jpg" alt="備用10" style="width:90px;aspect-ratio:auto;object-fit:cover;object-position:center top;flex-shrink:0;">
      <div class="qr-card-body" style="display:flex;flex-direction:column;justify-content:center;">
        <div class="qr-machine" style="color:var(--gray);">備用</div>
        <div class="qr-store">擎天測試店 10</div>
        <div class="qr-num">111169M10</div>
      </div>
    </div>

  </div>
</div>

<!-- Lightbox -->
<div class="lb-wrap" id="lb" onclick="closeLB()">
  <div class="lb-close" onclick="closeLB()">✕</div>
  <img id="lb-img" src="" alt="">
  <div class="lb-label" id="lb-label"></div>
  <div class="lb-sub" id="lb-sub"></div>
</div>

<footer class="site-footer">擎天有限公司 Propsky · TAGE 2026</footer>
<script src="nav.js"></script>
<script>
  function openLB(src, label, sub) { openQR(src, label, sub); }
  function openQR(src, label, sub) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lb-label').textContent = label;
    document.getElementById('lb-sub').textContent = sub;
    document.getElementById('lb').classList.add('open');
  }
  function closeLB() {
    document.getElementById('lb').classList.remove('open');
  }
</script>
</body>
</html>
