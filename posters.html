<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>海報速查 · TAGE 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .poster-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .poster-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
    }
    .poster-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }
    .poster-card-body {
      padding: 8px 10px 10px;
    }
    .poster-num {
      font-size: .65rem;
      font-weight: 700;
      color: var(--gray);
      margin-bottom: 2px;
    }
    .poster-name {
      font-size: .82rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .poster-target {
      font-size: .68rem;
      color: var(--text2);
    }
    .poster-links {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .poster-link-chip {
      font-size: .65rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 6px;
      text-decoration: none;
    }
    .chip-blue  { background: var(--blue-bg);  color: var(--blue); }
    .chip-amber { background: var(--amber-bg); color: var(--amber); }
    .chip-green { background: var(--green-bg); color: var(--green); }
    .chip-gray  { background: var(--gray-bg);  color: var(--gray); }

    .poster-full-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .poster-full-wrap.open { display: flex; }
    .poster-full-wrap img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .poster-full-close {
      position: absolute;
      top: 12px; right: 16px;
      color: #fff;
      font-size: 1.6rem;
      font-weight: 900;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back">← 返回</a>
  <div class="title">🗂 海報速查</div>
</div>

<div class="section" style="padding-top:12px;">
  <p style="font-size:.78rem;color:var(--text2);margin-bottom:12px;">點縮圖放大看・點機台連結跳頁面</p>

  <div class="poster-grid">

    <!-- #1 M06 搖馬 -->
    <div class="poster-card">
      <img src="poster-1.jpg" alt="海報 #1" onclick="openPoster('poster-1.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #1</div>
        <div class="poster-name">搖馬掃碼支付</div>
        <div class="poster-target">零散台主・商場</div>
        <div class="poster-links">
          <a href="m06.html" class="poster-link-chip chip-amber">M06 搖馬</a>
        </div>
      </div>
    </div>

    <!-- #2 M12 兌幣機 -->
    <div class="poster-card">
      <img src="poster-2.jpg" alt="海報 #2" onclick="openPoster('poster-2.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #2</div>
        <div class="poster-name">物聯網兌幣機</div>
        <div class="poster-target">無人店老闆</div>
        <div class="poster-links">
          <a href="m12.html" class="poster-link-chip chip-green">M12 兌幣機</a>
        </div>
      </div>
    </div>

    <!-- #3 老機台升級 -->
    <div class="poster-card">
      <img src="poster-3.jpg" alt="海報 #3" onclick="openPoster('poster-3.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #3</div>
        <div class="poster-name">老機台升級</div>
        <div class="poster-target">傳統機台業者</div>
        <div class="poster-links">
          <a href="m02.html" class="poster-link-chip chip-amber">M02</a>
          <a href="m03.html" class="poster-link-chip chip-amber">M03</a>
          <a href="m04.html" class="poster-link-chip chip-amber">M04</a>
        </div>
      </div>
    </div>

    <!-- #4 娃娃機多元支付 -->
    <div class="poster-card">
      <img src="poster-4.jpg" alt="海報 #4" onclick="openPoster('poster-4.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #4</div>
        <div class="poster-name">娃娃機多元支付</div>
        <div class="poster-target">娃娃機台主</div>
        <div class="poster-links">
          <a href="m01.html" class="poster-link-chip chip-blue">M01 娃娃機</a>
        </div>
      </div>
    </div>

    <!-- #5 旗艦連動篇 -->
    <div class="poster-card">
      <img src="poster-5.jpg" alt="海報 #5" onclick="openPoster('poster-5.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #5</div>
        <div class="poster-name">旗艦連動篇</div>
        <div class="poster-target">大型場主・連鎖品牌</div>
        <div class="poster-links">
          <a href="m01.html" class="poster-link-chip chip-blue">M01</a>
          <a href="m08.html" class="poster-link-chip chip-gray">M08</a>
          <a href="m11.html" class="poster-link-chip chip-blue">M11</a>
        </div>
      </div>
    </div>

    <!-- #6 一番賞 -->
    <div class="poster-card">
      <img src="poster-6.jpg" alt="海報 #6" onclick="openPoster('poster-6.jpg')" style="cursor:pointer;">
      <div class="poster-card-body">
        <div class="poster-num">海報 #6</div>
        <div class="poster-name">一番賞數位轉型</div>
        <div class="poster-target">一番賞店家</div>
        <div class="poster-links">
          <a href="m11.html" class="poster-link-chip chip-blue">M11 一番賞</a>
        </div>
      </div>
    </div>

    <!-- #7 方格市集 -->
    <div class="poster-card" style="grid-column: 1 / -1; flex-direction: row; max-height: 140px;">
      <img src="poster-7.jpg" alt="海報 #7" onclick="openPoster('poster-7.jpg')" style="cursor:pointer; width:100px; aspect-ratio:auto; object-fit:cover; flex-shrink:0;">
      <div class="poster-card-body" style="display:flex;flex-direction:column;justify-content:center;">
        <div class="poster-num">海報 #7</div>
        <div class="poster-name">方格市集無人零售</div>
        <div class="poster-target">飯店・商辦・微型創業</div>
        <div class="poster-links">
          <a href="m09.html" class="poster-link-chip chip-green">M09 飯店</a>
          <a href="m10.html" class="poster-link-chip chip-green">M10 辦公室</a>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 全螢幕海報 lightbox -->
<div class="poster-full-wrap" id="posterLightbox" onclick="closePoster()">
  <div class="poster-full-close" onclick="closePoster()">✕</div>
  <img id="posterLightboxImg" src="" alt="">
</div>

<footer class="site-footer">擎天有限公司 Propsky · TAGE 2026</footer>
<script src="nav.js"></script>
<script>
  function openPoster(src) {
    document.getElementById('posterLightboxImg').src = src;
    document.getElementById('posterLightbox').classList.add('open');
  }
  function closePoster() {
    document.getElementById('posterLightbox').classList.remove('open');
  }
</script>
</body>
</html>
